<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zaproszenie na Roczek Karola</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'serif', cursive;
            background: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .invitation {
            width: 90%;
            max-width: 600px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,100,0,0.3);
            padding: 40px;
            text-align: center;
            position: relative;
            background-image: 
                radial-gradient(circle at 10% 20%, #87CEEB 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, #90EE90 0%, transparent 50%),
                linear-gradient(45deg, #E0F7FA 0%, white 100%);
        }
        .flowers {
            position: absolute;
            font-size: 60px;
            opacity: 0.7;
        }
        .top-left { top: 10px; left: 20px; }
        .top-right { top: 10px; right: 20px; }
        .bottom-left { bottom: 20px; left: 20px; transform: rotate(-10deg); }
        .bottom-right { bottom: 20px; right: 20px; transform: rotate(10deg); }
        .flowers::before { content: "🌸🌼🌺"; }
        .title {
            font-size: 4em;
            color: #228B22;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            margin: 20px 0;
            letter-spacing: 5px;
        }
        .subtitle {
            font-size: 1.5em;
            color: #4682B4;
            margin: 10px 0;
        }
        .date {
            font-size: 1.8em;
            color: #20B2AA;
            font-weight: bold;
            margin: 20px 0;
        }
        .goose {
            font-size: 100px;
            margin: 30px 0;
        }
        .goose::before { content: "🪿👶"; }
    </style>
</head>
<body>
    <div class="invitation">
        <div class="flowers top-left"></div>
        <div class="flowers top-right"></div>
        <div class="subtitle">Serdecznie zapraszam</div>
        <div class="title">NA ROCZEK<br>KAROLA</div>
        <div class="date">20 CZERWCA 2026 R.<br>(SOBOTA)<br>GODZ. 14:00<br>MIEJSCE: REMIZA W RZUCHOWIE</div>
        <div class="goose"></div>
        <div class="flowers bottom-left"></div>
        <div class="flowers bottom-right"></div>
    </div>
</body>
</html>
